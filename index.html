<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GZ AI Drone Visualization</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  width: 100%;
  max-width: 1200px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

h1 { font-size: 32px; margin-bottom: 10px; }

.sub {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* MAP */
.map-container {
  position: relative;
  width: 100%;
  height: 50vh;
  min-height: 350px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,.6);
}

.map-frame {
  width: 100%;
  height: 100%;
  border: 0;
}

/* PIN */
.pin {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 22px;
  height: 22px;
  background: #2563eb;
  border-radius: 50%;
  transform: translate(-50%, -100%);
  box-shadow: 0 0 20px rgba(37,99,235,.8);
  display: none;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(37,99,235,.7); }
  70% { box-shadow: 0 0 0 20px rgba(37,99,235,0); }
  100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
}

/* BUTTON */
button {
  margin-top: 30px;
  padding: 14px 28px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: white;
  transition: 0.3s;
}

button:disabled {
  background: #1e293b;
  cursor: not-allowed;
}

button:hover:not(:disabled) {
  background: #1d4ed8;
}

/* STATUS */
#status {
  margin-top: 20px;
  color: #38bdf8;
  min-height: 24px;
}

/* PROGRESS BAR */
.progress-container {
  width: 100%;
  max-width: 600px;
  height: 10px;
  background: #1e293b;
  border-radius: 20px;
  margin: 15px auto;
  overflow: hidden;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #2563eb, #38bdf8);
  transition: width 0.3s ease;
}

/* VIDEO */
.video-wrapper {
  width: 100%;
  margin-top: 40px;
  display: none;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,.7);
}

.video-inner {
  padding: 56.25% 0 0 0;
  position: relative;
}

.video-inner iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.notice {
  margin-top: 20px;
  font-size: 13px;
  color: #64748b;
}

/* POPUP */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.popup-box h2 { margin-bottom: 10px; }

.popup-box p {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}

.popup-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  h1 { font-size: 24px; }
  .sub { font-size: 14px; }
  button { width: 100%; }
}
</style>
</head>

<body>

<div class="container">

  <h1>AI Drone Property Visualization</h1>
  <div class="sub">
    Experience how GZ AI generates cinematic drone tours in under 10 minutes.
  </div>

  <div class="map-container">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15002.786128663773!2d-155.87608178962384!3d19.937189056254127!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x79538793d6e16f1f%3A0xa7e015de3a37325a!2sMauna%20Lani%2C%20Auberge%20Collection!5e0!3m2!1str!2sus!4v1772563934990!5m2!1str!2sus"
      class="map-frame"
      loading="lazy">
    </iframe>
    <div id="fakePin" class="pin"></div>
  </div>

  <button id="generateBtn" onclick="generateDrone()">Generate AI Drone Video</button>

  <div id="status"></div>

  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <div id="videoWrapper" class="video-wrapper">
    <div class="video-inner">
      <iframe 
        src="https://player.vimeo.com/video/1170030964?badge=0&autopause=0&autoplay=1&loop=1"
        frameborder="0"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="notice">
    *Demo visualization available for featured showcase property only.
  </div>

</div>

<!-- EMAIL POPUP -->
<div id="emailPopup" class="popup-overlay">
  <div class="popup-box">
    <h2>Unlock AI Drone Demo</h2>
    <p>Enter your work email to generate the AI drone visualization.</p>
    <input type="email" id="userEmail" placeholder="Work Email" required />
    <input type="text" id="agencyName" placeholder="Agency Name" required />
    <button onclick="submitLead()">Unlock & Generate</button>
  </div>
</div>

<script>
const WEBHOOK_URL = "https://bjl82de9.rpcl.app/webhook/9c8df4f1-84a0-4d33-8333-0e51cb4bfe09";

function generateDrone() {
  const alreadySubmitted = sessionStorage.getItem("gz_lead_submitted");
  if (!alreadySubmitted) {
    document.getElementById("emailPopup").style.display = "flex";
    return;
  }
  startDroneProcess();
}

function submitLead() {
  const email = document.getElementById("userEmail").value.trim();
  const name = document.getElementById("agencyName").value.trim();

  if (!email || !name) {
    alert("Please fill all fields.");
    return;
  }

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: email, agency: name })
  }).then(() => {
    sessionStorage.setItem("gz_lead_submitted", "true");
    document.getElementById("emailPopup").style.display = "none";
    startDroneProcess();
  }).catch(() => {
    alert("Something went wrong. Please try again.");
  });
}

function startDroneProcess() {
  const btn = document.getElementById("generateBtn");
  const pin = document.getElementById("fakePin");
  const status = document.getElementById("status");
  const video = document.getElementById("videoWrapper");
  const progressBar = document.getElementById("progressBar");

  btn.disabled = true;
  video.style.display = "none";
  progressBar.style.width = "0%";
  pin.style.display = "block";

  status.innerText = "Analyzing property terrain...";
  let progress = 0;

  const interval = setInterval(() => {
    progress += 2;
    progressBar.style.width = progress + "%";

    if (progress >= 30) status.innerText = "Calculating optimal cinematic flight path...";
    if (progress >= 65) status.innerText = "Rendering AI drone visualization...";

    if (progress >= 100) {
      clearInterval(interval);
      status.innerText = "Visualization ready.";
      video.style.display = "block";
      video.scrollIntoView({ behavior: "smooth", block: "center" });
      btn.disabled = false;
    }
  }, 90);
}
</script>

</body>
</html>
